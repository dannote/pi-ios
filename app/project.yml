name: PiTerminal
options:
  bundleIdPrefix: dev.pi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

targets:
  PiTerminal:
    type: application
    platform: iOS
    sources:
      - path: PiTerminal
        excludes:
          - "*/BridgingHeader.h"
    resources:
      - path: PiTerminal/Resources
    settings:
      base:
        INFOPLIST_FILE: PiTerminal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: dev.pi.terminal
        SWIFT_VERSION: "6.0"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_OBJC_BRIDGING_HEADER: PiTerminal/BridgingHeader.h
        SWIFT_INCLUDE_PATHS:
          - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator/Headers"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator/Headers"
          - "$(PROJECT_DIR)/../vendor/bun/include"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator"
          - "$(PROJECT_DIR)/../vendor/bun/lib"
        OTHER_LDFLAGS:
          # Ghostty
          - "-lghostty-fat"
          # Bun static libraries
          - "-lbun"
          - "-lJavaScriptCore"
          - "-lWTF"
          - "-lbmalloc"
          - "-lcrypto"
          - "-lssl"
          - "-ldecrepit"
          - "-lbrotlicommon"
          - "-lbrotlidec"
          - "-lbrotlienc"
          - "-lcares"
          - "-lhwy"
          - "-ldeflate"
          - "-llolhtml"
          - "-lls-hpack"
          - "-lz"
          - "-larchive"
          - "-lhdr_histogram_static"
          - "-lzstd"
          # mimalloc object
          - "$(PROJECT_DIR)/../vendor/bun/lib/mimalloc.o"
          # System libraries
          - "-licucore"
          - "-lresolv"
          - "-lc++"
          - "-lobjc"
          # Frameworks
          - "-framework Metal"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework QuartzCore"
          - "-framework IOSurface"
          - "-framework CoreVideo"
          - "-framework UIKit"
          - "-framework Security"
