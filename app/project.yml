name: Pi
options:
  bundleIdPrefix: dev.pi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

targets:
  Pi:
    type: application
    platform: iOS
    sources:
      - path: Pi
        excludes:
          - "*/BridgingHeader.h"
    resources:
      - path: Pi/Resources
      - path: Pi/Assets.xcassets
    settings:
      base:
        INFOPLIST_FILE: Pi/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.dannote.pi
        PRODUCT_NAME: Pi
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: N7D7M3Q3CD
        SWIFT_OBJC_BRIDGING_HEADER: Pi/BridgingHeader.h
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        OTHER_LDFLAGS:
          - "-lghostty-fat"
          - "-lbun"
          - "-lJavaScriptCore"
          - "-lWTF"
          - "-lbmalloc"
          - "-lcrypto"
          - "-lssl"
          - "-ldecrepit"
          - "-lbrotlicommon"
          - "-lbrotlidec"
          - "-lbrotlienc"
          - "-lcares"
          - "-lhwy"
          - "-ldeflate"
          - "-llolhtml"
          - "-lls-hpack"
          - "-lz"
          - "-larchive"
          - "-lhdr_histogram_static"
          - "-lzstd"
          - "$(CUSTOM_MIMALLOC)"
          - "-licucore"
          - "-lresolv"
          - "-lc++"
          - "-lobjc"
          - "-framework Metal"
          - "-framework CoreText"
          - "-framework CoreGraphics"
          - "-framework CoreFoundation"
          - "-framework Foundation"
          - "-framework QuartzCore"
          - "-framework IOSurface"
          - "-framework CoreVideo"
          - "-framework UIKit"
          - "-framework Security"
      configs:
        Debug:
          SWIFT_INCLUDE_PATHS:
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator/Headers"
          HEADER_SEARCH_PATHS:
            - "$(inherited)"
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator/Headers"
            - "$(PROJECT_DIR)/../vendor/bun/include"
          LIBRARY_SEARCH_PATHS:
            - "$(inherited)"
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64-simulator"
            - "$(PROJECT_DIR)/../vendor/bun/lib"
          CUSTOM_MIMALLOC: "$(PROJECT_DIR)/../vendor/bun/lib/mimalloc.o"
        Release:
          SWIFT_INCLUDE_PATHS:
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64/Headers"
          HEADER_SEARCH_PATHS:
            - "$(inherited)"
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64/Headers"
            - "$(PROJECT_DIR)/../vendor/bun-device/include"
          LIBRARY_SEARCH_PATHS:
            - "$(inherited)"
            - "$(PROJECT_DIR)/../vendor/ghostty/GhosttyKit.xcframework/ios-arm64"
            - "$(PROJECT_DIR)/../vendor/bun-device/lib"
          CUSTOM_MIMALLOC: "$(PROJECT_DIR)/../vendor/bun-device/lib/mimalloc.o"
